services:
  darussunnah-frontend:
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
    container_name: darussunnah-frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://darussunnahparung.com/api
    expose:
      - "3000"
    networks:
      - app-network

  darussunnah-backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    container_name: darussunnah-backend
    restart: always
    environment:
      APP_URL: https://darussunnahparung.com
      API_PORT: "8080"
      ALLOWED_ORIGINS: https://darussunnahparung.com,https://www.darussunnahparung.com
      DB_PATH: /data/darussunnah.db
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: "true"
      DEV_MODE: "false"
      ENVIRONMENT: production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-mock_client_id}
      FONNTE_API_URL: ${FONNTE_API_URL:-https://api.fonnte.com/send}
      FONNTE_API_KEY: ${FONNTE_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LOG_LEVEL: info
      TZ: Asia/Bangkok
    volumes:
      - ./data:/data
      - ./data/uploads:/app/apps/backend/public/uploads
    expose:
      - "8080"
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: my-docker-apps_app-network
